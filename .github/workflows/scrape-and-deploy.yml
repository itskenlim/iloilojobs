name: Scrape and deploy

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: true

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scrapers
        working-directory: scrapers
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run scrape pipeline
        working-directory: scrapers
        run: |
          python -m iloilo_jobs.cli scrape \
            --out ../web/public/data/jobs.json \
            --metadata ../web/public/data/metadata.json \
            --cache-dir ../cache/raw \
            --log-dir ../logs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        run: npm run build

      - name: Commit updated job data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/jobs.json web/public/data/metadata.json
          if git diff --staged --quiet; then
            echo "No job data changes"
          else
            git commit -m "chore: refresh scraped job data"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
