name: Scrape and deploy

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: true

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scrapers
        working-directory: scrapers
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run scrape pipeline
        working-directory: scrapers
        run: |
          python -m iloilo_jobs.cli scrape \
            --out ../web/public/data/jobs.json \
            --metadata ../web/public/data/metadata.json \
            --cache-dir ../cache/raw \
            --log-dir ../logs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Sync jobs.json into the repo for local/dev.
      # Pages already has fresh data from this run — this step must not block deploys.
      - name: Commit updated job data
        continue-on-error: true
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Keep scraped files across branch reset
          cp web/public/data/jobs.json /tmp/jobs.json
          cp web/public/data/metadata.json /tmp/metadata.json

          for attempt in 1 2 3; do
            echo "Commit attempt $attempt"
            git fetch origin main
            git checkout -B main origin/main
            cp /tmp/jobs.json web/public/data/jobs.json
            cp /tmp/metadata.json web/public/data/metadata.json
            git add web/public/data/jobs.json web/public/data/metadata.json

            if git diff --staged --quiet; then
              echo "No job data changes vs origin/main"
              exit 0
            fi

            git commit -m "chore: refresh scraped job data"
            if git push origin HEAD:main; then
              echo "Pushed job data"
              exit 0
            fi
            echo "Push rejected, retrying..."
            sleep 5
          done

          echo "Could not push job data after retries (Pages deploy already succeeded)"
          exit 1
